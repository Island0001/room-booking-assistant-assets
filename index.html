<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="referrer" content="no-referrer">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="会議室予約">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#ffffff">
  <meta http-equiv="Cache-Control" content="no-store">
  <meta http-equiv="Pragma" content="no-cache">
  <title>会議室予約アシスタント</title>
  <link rel="icon" type="image/png" sizes="512x512" href="./app_icon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png">
  <link rel="apple-touch-icon-precomposed" sizes="180x180" href="./apple-touch-icon.png">
  <link rel="apple-touch-icon" href="./app_icon.png">
  <style>
    html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",sans-serif;background:#f5f7fb;color:#0f172a}
    body{display:grid;place-items:center}
    main{width:min(420px,calc(100vw - 32px));display:grid;gap:16px;text-align:center}
    img{width:96px;height:96px;border-radius:22px;margin:0 auto;box-shadow:0 12px 28px rgba(15,23,42,.18)}
    h1{font-size:22px;margin:0}
    p{margin:0;color:#64748b;line-height:1.7}
    a{display:inline-flex;align-items:center;justify-content:center;min-height:46px;padding:0 16px;border-radius:14px;background:#2563eb;color:white;text-decoration:none;font-weight:800}
    iframe{position:fixed;inset:0;width:100%;height:100%;border:0;background:white}
    .hidden{display:none}
  </style>
</head>
<body>
  <main id="fallback">
    <img src="./app_icon.png" alt="">
    <h1>会議室予約アシスタント</h1>
    <p id="message">アプリを開いています...</p>
    <a id="openLink" href="https://script.google.com/macros/s/AKfycbwbnP0wGgB8j60FNN_ayNY9qTfu7SMmAetpxsnfwC9O-jzOauH9YVde5xyUv6GmcipmhQ/exec">アプリを開く</a>
  </main>
  <script>
    const APP_URL = 'https://script.google.com/macros/s/AKfycbwbnP0wGgB8j60FNN_ayNY9qTfu7SMmAetpxsnfwC9O-jzOauH9YVde5xyUv6GmcipmhQ/exec';
    const APP_BUILD = '20260708-74';
    const STORAGE_KEY = 'roomBookingAssistantAccessKey';
    const params = new URLSearchParams(location.search);
    const access = params.get('access') || localStorage.getItem(STORAGE_KEY) || '';
    if(access) localStorage.setItem(STORAGE_KEY, access);
    const targetUrl = new URL(APP_URL);
    if(access) targetUrl.searchParams.set('access', access);
    targetUrl.searchParams.set('v', APP_BUILD);
    targetUrl.searchParams.set('t', String(Date.now()));
    const target = targetUrl.toString();
    const openLink = document.getElementById('openLink');
    openLink.href = target;
    document.getElementById('message').textContent = access ? 'アプリを開いています...' : 'このショートカットには認証情報がありません。管理者から発行された初回URLをSafariで開き、ホーム画面に追加し直してください。';
    if(access){
      document.getElementById('fallback').className = 'hidden';
      const frame = document.createElement('iframe');
      frame.src = target;
      frame.title = '会議室予約アシスタント';
      frame.allow = 'clipboard-read; clipboard-write; fullscreen';
      document.body.appendChild(frame);
    }else{
      openLink.className = 'hidden';
    }
  </script>
</body>
</html>

<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="referrer" content="no-referrer">
  <meta name="robots" content="noindex">
  <title>会議室予約を開いています</title>
  <style>
    html,body{margin:0;min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",sans-serif;background:#f4f7fb;color:#0f172a}
    body{min-height:100dvh;display:grid;place-items:center;padding:20px}
    main{width:min(440px,100%);background:#fff;border:1px solid #dbe4ef;border-radius:18px;box-shadow:0 18px 48px rgba(15,23,42,.14);padding:22px;display:grid;gap:14px}
    h1{font-size:20px;margin:0}
    p{margin:0;color:#64748b;line-height:1.7}
    a{min-height:48px;border-radius:14px;background:#2563eb;color:#fff;text-decoration:none;font-weight:900;display:flex;align-items:center;justify-content:center;padding:0 16px}
    .warn{background:#fef2f2;color:#b91c1c;border-radius:12px;padding:12px;font-weight:800}
  </style>
</head>
<body>
  <main>
    <h1>会議室予約を開いています</h1>
    <p id="message">アプリ本体へ移動します。</p>
    <a id="openLink" href="#">開かない場合はこちら</a>
  </main>
  <script>
    const APP_URL = 'https://script.google.com/macros/s/AKfycbwbnP0wGgB8j60FNN_ayNY9qTfu7SMmAetpxsnfwC9O-jzOauH9YVde5xyUv6GmcipmhQ/exec';
    const STORAGE_KEY = 'roomBookingAssistantAccessKey';
    const params = new URLSearchParams(location.search);
    const urlAccess = params.get('access') || '';
    const storedAccess = localStorage.getItem(STORAGE_KEY) || '';
    const access = urlAccess || storedAccess;
    if (access) localStorage.setItem(STORAGE_KEY, access);
    const target = new URL(APP_URL);
    if (access) target.searchParams.set('access', access);
    target.searchParams.set('v', '20260709-open');
    target.searchParams.set('t', String(Date.now()));
    const href = target.toString();
    document.getElementById('openLink').href = href;
    if (!access) {
      document.getElementById('message').className = 'warn';
      document.getElementById('message').textContent = '認証情報が見つかりません。管理者から届いたアプリ追加URLを開いてください。';
    } else {
      setTimeout(() => location.replace(href), 100);
    }
  </script>
</body>
</html>

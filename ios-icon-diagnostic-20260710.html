<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="referrer" content="no-referrer">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="予約TEST">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>予約TEST</title>
  <link rel="preload" as="image" href="https://island0001.github.io/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="512x512" href="https://island0001.github.io/app-icon-512.png">
  <link rel="apple-touch-icon" sizes="180x180" href="https://island0001.github.io/apple-touch-icon.png">
  <link rel="apple-touch-icon-precomposed" sizes="180x180" href="https://island0001.github.io/apple-touch-icon-precomposed.png">
  <link rel="apple-touch-icon" href="https://island0001.github.io/apple-touch-icon.png">
  <style>
    html,body{margin:0;min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",sans-serif;background:#f4f7fb;color:#0f172a}
    main{min-height:100dvh;display:grid;place-items:center;padding:24px}
    section{width:min(420px,100%);background:#fff;border:1px solid #dbe4ef;border-radius:18px;padding:22px;text-align:center;box-shadow:0 18px 48px rgba(15,23,42,.14)}
    img{width:96px;height:96px;border-radius:22px;box-shadow:0 14px 34px rgba(15,23,42,.18)}
    h1{font-size:24px;margin:14px 0 8px}
    p{line-height:1.7;color:#64748b;margin:0}
  </style>
</head>
<body>
  <main>
    <section>
      <img src="https://island0001.github.io/apple-touch-icon.png" alt="">
      <h1>予約TEST</h1>
      <p>ホーム画面アイコン診断用です。追加後に「会」になるか確認します。</p>
    </section>
  </main>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(reg => reg.unregister())).catch(() => {});
    }
  </script>
</body>
</html>
